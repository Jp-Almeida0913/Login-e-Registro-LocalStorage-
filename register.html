<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar</title>
    <link rel="stylesheet" href="global.css">
</head>
<body>
    <div>
        <form>
            <h1>Registrar</h1>
            <p>Preencha os campos corretamente!</p>
            <input type="text" id="registerUsername" placeholder="Usuário">
            <br><br>
            <input type="password" id="registerPassword" placeholder="Senha">
            <br><br>
            <input type="password" id="registerPasswordConfirm" placeholder="Confirmar Senha">
            <br><br>
            <button type="submit" id="btn">Confirmar</button>
        </form>
    </div>
</body>
<script type="module" src="js/register.js"></script>
</html>
